name: Build macOS

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14 # arm64
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: stable

      - run: flutter config --enable-macos-desktop
      - run: flutter pub get

      - name: Analyze
        run: flutter analyze lib test integration_test

      - name: Fetch ffmpeg + ffprobe (static, libass-enabled)
        run: |
          curl -fsSL "https://evermeet.cx/ffmpeg/getrelease/zip" -o ffmpeg.zip
          curl -fsSL "https://evermeet.cx/ffmpeg/getrelease/ffprobe/zip" -o ffprobe.zip
          unzip -oq ffmpeg.zip && unzip -oq ffprobe.zip
          chmod +x ffmpeg ffprobe
          echo "FFMPEG=$PWD/ffmpeg" >> "$GITHUB_ENV"
          echo "FFPROBE=$PWD/ffprobe" >> "$GITHUB_ENV"

      - name: Test (export + caption burn on the shipping ffmpeg)
        run: flutter test

      - name: Build macOS release
        run: flutter build macos --release

      - name: Bundle ffmpeg into the .app
        run: |
          APP="build/macos/Build/Products/Release/palmier_x.app"
          cp "$FFMPEG" "$APP/Contents/MacOS/ffmpeg"
          chmod +x "$APP/Contents/MacOS/ffmpeg"
          # ffprobe powers the Omni engine's media probe — ship it too.
          cp "$FFPROBE" "$APP/Contents/MacOS/ffprobe"
          chmod +x "$APP/Contents/MacOS/ffprobe"
          # Ad-hoc re-sign so the bundled binaries are allowed inside the app.
          codesign --force --deep --sign - "$APP" || true

      - name: Smoke test — boot the bundled app on macOS (no crash)
        run: |
          BIN="build/macos/Build/Products/Release/palmier_x.app/Contents/MacOS/palmier_x"
          "$BIN" &
          PID=$!
          sleep 12
          if ! kill -0 "$PID" 2>/dev/null; then
            echo "App crashed on startup (libmpv / dylib load failure)"; exit 1
          fi
          echo "Booted OK: PID $PID alive after 12s (Flutter engine + libmpv loaded)"
          kill -9 "$PID" 2>/dev/null || true

      # No integration_test here: the macOS CI runner has no GUI session to
      # foreground the app window (`open returned 1`), so flutter desktop
      # integration tests can't launch. libmpv load is covered by the boot
      # smoke test above; the shared decode path is proven on the Windows runner.

      - name: Zip the .app
        run: |
          cd build/macos/Build/Products/Release
          ditto -c -k --keepParent palmier_x.app "$GITHUB_WORKSPACE/PalmierX-macos.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: PalmierX-macos
          path: PalmierX-macos.zip

      - name: Attach to Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: PalmierX-macos.zip
