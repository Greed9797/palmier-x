name: Build Windows

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: stable

      - run: flutter config --enable-windows-desktop
      - run: flutter pub get

      - name: Analyze
        run: flutter analyze lib test

      - name: Fetch ffmpeg (drawtext-enabled gpl build)
        shell: pwsh
        run: |
          $url = 'https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip'
          Invoke-WebRequest -Uri $url -OutFile ffmpeg.zip
          Expand-Archive ffmpeg.zip -DestinationPath ffmpeg_extract
          $bin = (Get-ChildItem -Recurse ffmpeg_extract -Filter ffmpeg.exe | Select-Object -First 1).DirectoryName
          "FFMPEG=$bin\ffmpeg.exe"   | Out-File -FilePath $env:GITHUB_ENV -Append
          "FFPROBE=$bin\ffprobe.exe" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Test (export + caption burn on the shipping ffmpeg)
        run: flutter test

      - name: Build Windows release
        run: flutter build windows --release

      - name: Bundle ffmpeg + VC++ runtime into release
        shell: pwsh
        run: |
          $rel = 'build\windows\x64\runner\Release'
          New-Item -ItemType Directory -Force -Path "$rel\ffmpeg" | Out-Null
          Copy-Item $env:FFMPEG "$rel\ffmpeg\ffmpeg.exe"
          # Flutter release links the VC++ runtime; bundle it so a clean
          # Windows machine (no redistributable installed) still launches.
          foreach ($d in 'msvcp140.dll','vcruntime140.dll','vcruntime140_1.dll','concrt140.dll') {
            Copy-Item "C:\Windows\System32\$d" $rel\ -ErrorAction SilentlyContinue
          }
          $missing = @('msvcp140.dll','vcruntime140.dll','vcruntime140_1.dll') | Where-Object { -not (Test-Path "$rel\$_") }
          if ($missing) { throw "VC++ runtime missing from bundle: $($missing -join ', ')" }
          Write-Host "Bundled VC++ runtime: $(Get-ChildItem $rel\*140*.dll | ForEach-Object Name)"

      - name: Smoke test — boot the bundled app on real Windows (no crash)
        shell: pwsh
        run: |
          $exe = 'build\windows\x64\runner\Release\palmier_x.exe'
          $p = Start-Process $exe -PassThru
          Start-Sleep -Seconds 12
          if ($p.HasExited) { throw "App crashed on startup (exit code $($p.ExitCode)) — DLL load / libmpv init failure" }
          Write-Host "Booted OK: PID $($p.Id) alive after 12s (Flutter engine + libmpv loaded, window created)"
          Stop-Process -Id $p.Id -Force

      - name: Integration test — libmpv decodes a video on Windows
        run: flutter test integration_test -d windows

      - name: Zip release
        shell: pwsh
        run: Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath PalmierX-windows.zip

      - uses: actions/upload-artifact@v4
        with:
          name: PalmierX-windows
          path: PalmierX-windows.zip

      - name: Attach to Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: PalmierX-windows.zip
